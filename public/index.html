<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CHOTU | Quick Link Sharing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-header">
    <div class="logo-wrap">
      <h1 class="logo">CHOTU</h1>
      <p class="tagline">INSTANT LINK SHARING</p>
    </div>
    <div class="spectrum-bar"></div>
  </header>

  <main class="container">
    
    <!-- CARD 1: CREATE A CODE -->
    <section class="polaroid-card">
      <div class="photo-area">
        
        <div id="shortenFormWrap" class="card-content">
          <h2 class="card-title">SHARE A LINK</h2>
          <p class="card-desc">Paste a long URL to generate a 6-digit code.</p>
          
          <form id="urlForm" autocomplete="off" class="action-form">
            <input id="urlInput" type="url" placeholder="https://..." required />
            <p class="error-msg" id="shortenError" hidden></p>
            <button type="submit" id="shortenBtn" class="primary-btn">CREATE CODE</button>
          </form>
        </div>

        <div id="shortenResultWrap" class="card-content" hidden>
          <h2 class="card-title">YOUR CODE</h2>
          
          <!-- Visual Timer Bar -->
          <div class="timer-track">
            <div class="timer-fill" id="timerFill"></div>
          </div>
          
          <!-- Click directly on this element to copy -->
          <div class="code-display" id="codeText" title="Click to copy" data-original="">------</div>
          <p class="click-hint" id="copyHint">CLICK THE CODE TO COPY</p>
          
          <div class="button-group">
            <button id="resetBtn" class="secondary-btn">NEW LINK</button>
          </div>
        </div>

      </div>
    </section>

    <!-- CARD 2: USE A CODE -->
    <section class="polaroid-card">
      <div class="photo-area">
        <div class="card-content">
          <h2 class="card-title">USE A CODE</h2>
          <p class="card-desc">Enter a 6-digit code to open the link.</p>
          
          <form id="codeForm" autocomplete="off" class="action-form">
            <input id="codeInput" type="text" placeholder="XXXXXX" maxlength="6" required />
            <p class="error-msg" id="redirectError" hidden></p>
            <button type="submit" id="goBtn" class="primary-btn">OPEN LINK</button>
          </form>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    MADE BY <a href="https://github.com/Prasad3Suryavanshi" target="_blank" rel="noopener noreferrer">PRASAD SURYAVANSHI</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
